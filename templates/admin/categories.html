{% extends "admin/base_admin.html" %}
{% block title %}Categories{% endblock %}
{% block content %}
<div class="card">
    <div class="card-title"><i class="fas fa-plus-circle"></i> Add New Category</div>
    <form method="POST" action="{{ url_for('admin_create_category') }}">
        <input type="text" name="name" placeholder="Category Name" required>
        <input type="text" name="icon" placeholder="Font Awesome icon (e.g., fas fa-leaf)" value="fas fa-utensils">
        <textarea name="description" rows="2" placeholder="Description (optional)"></textarea>
        <button type="submit" class="btn btn-red">Create Category</button>
    </form>
</div>
<div class="card">
    <div class="card-title"><i class="fas fa-tags"></i> Existing Categories</div>
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>ID</th><th>Name</th><th>Icon</th><th>Description</th><th>Actions</th></tr></thead>
            <tbody>
                {% for cat in categories %}
                <tr>
                    <td>{{ cat.id }}</td>
                    <td>{{ cat.name }}</td>
                    <td><i class="{{ cat.icon }}"></i> {{ cat.icon }}</td>
                    <td>{{ cat.description or '-' }}</td>
                    <td>
                        <form method="POST" action="{{ url_for('admin_delete_category', cat_id=cat.id) }}" onsubmit="return confirm('Delete category? This will remove all tiffins under it.');"><button class="btn btn-danger">Delete</button></form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
